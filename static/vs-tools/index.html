<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Tools - Vintage Story Calculators & Planners</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="landing-hero">
      <h1>Vintage Story Tools</h1>
      <p class="subtitle">Calculators and planners for Vintage Story</p>
    </header>

    <main>
      <div class="landing-grid" id="toolGrid"></div>
    </main>
  </div>

  <script src="js/common.js"></script>
  <script>
    const TOOL_CARDS = [
      { id: 'alloys',  name: 'Alloy Calculator',     href: 'alloys.html',  accent: '#cd7f32', icon: 'img/Ingot-tinbronze.png', desc: 'Calculate perfect metal ratios for bronze, brass, electrum, and more. See exact nugget counts for your crucible.' },
      { id: 'meals',   name: 'Meal Planner',          href: 'meals.html',   accent: '#4ade80', icon: 'img/food/cookingpot.png',  desc: 'Plan optimal meals for balanced nutrition across all five food categories. Maximize satiety and shelf life.' },
      { id: 'armor',   name: 'Armor Calculator',      href: 'armor.html',   accent: '#60a5fa', icon: 'img/armor/chain.png',     desc: 'Compare armor sets side-by-side. Calculate damage reduction, penalties, and find the best loadout for your needs.' },
      { id: 'farming', name: 'Crop Rotation Planner', href: 'farming.html', accent: '#a3e635', icon: 'img/farming/carrot.png',  desc: 'Plan crop rotations to maintain soil N/P/K fertility. Simulate nutrient depletion across multiple seasons.' },
      { id: 'steel',   name: 'Steel Making Tracker',  href: 'steel.html',   accent: '#f87171', icon: 'img/steel/ingot-steel.png', desc: 'Track your progress from iron ore to steel. Calculate materials needed and monitor each production step.' },
    ];

    const grid = document.getElementById('toolGrid');
    for (const tool of TOOL_CARDS) {
      const card = document.createElement('a');
      card.className = 'landing-card';
      card.href = tool.href;
      card.style.setProperty('--card-accent', tool.accent);

      card.innerHTML = `
        <div class="landing-card-header">
          <img class="landing-card-icon pixel-icon" src="${tool.icon}" alt="" width="48" height="48"
               onerror="this.style.display='none'">
          <span class="landing-card-name">${tool.name}</span>
        </div>
        <div class="landing-card-desc">${tool.desc}</div>
      `;

      grid.appendChild(card);
    }
  </script>
</body>
</html>
