<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vrrdnt.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #070706;
      --bg-panel:    #0d0d0b;
      --bg-hover:    #131310;
      --accent:      #c0581c;
      --accent-hi:   #d97040;
      --accent-dim:  #6b3010;
      --text:        #b4ac9c;
      --text-bright: #ddd4c0;
      --text-dim:    #484038;
      --border:      #1c1a16;
      --border-mid:  #2a2620;
    }

    html { font-size: 16px; }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      /* subtle scanline texture */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.06) 2px,
        rgba(0, 0, 0, 0.06) 4px
      );
    }

    a { color: var(--accent-hi); text-decoration: none; transition: color 0.15s; }
    a:hover { color: var(--text-bright); }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 3.5rem;
    }

    .header h1 {
      font-size: 2.6rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
      line-height: 1;
      text-shadow: 0 0 40px rgba(192, 88, 28, 0.35);
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .header .tagline {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    /* ── Rule ── */
    .rule {
      border: none;
      border-top: 1px solid var(--border-mid);
      margin: 2.5rem 0;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 2.5rem;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }

    .section-label::before {
      content: '// ';
      color: var(--accent-dim);
    }

    /* ── Tool list ── */
    .tool-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
    }

    .tool-entry {
      display: block;
      padding: 1rem 1rem 1rem 1.1rem;
      border-left: 2px solid var(--border);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .tool-entry:hover {
      background: var(--bg-hover);
      border-left-color: var(--accent);
    }

    .tool-entry-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-bright);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
    }

    .tool-entry-name::before {
      content: '›';
      color: var(--accent-dim);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
    }

    .tool-entry:hover .tool-entry-name {
      color: #ffffff;
    }

    .tool-entry:hover .tool-entry-name::before {
      color: var(--accent-hi);
    }

    .tool-entry-desc {
      margin-top: 0.3rem;
      padding-left: 1.1rem;
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    @media (max-width: 640px) {
      .page { padding: 2.5rem 1.25rem 3.5rem; }
      .header h1 { font-size: 1.8rem; }
      .tool-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <h1>vrrdnt.dev<span class="cursor"></span></h1>
      <p class="tagline">tools and utilities, mostly for games</p>
    </header>

    <hr class="rule">

    <section class="section">
      <p class="section-label">vintage story</p>
      <div class="tool-list" id="vsTools"></div>
    </section>

    <hr class="rule">

    <footer>
      <a href="https://github.com/vrrdnt">github.com/vrrdnt</a>
    </footer>

  </div>

  <script>
    const VS_TOOLS = [
      { name: 'Alloy Calculator',      href: '/vs-tools/alloys.html',  desc: 'Calculate perfect metal ratios for bronze, brass, electrum, and more.' },
      { name: 'Meal Planner',           href: '/vs-tools/meals.html',   desc: 'Plan optimal meals for balanced nutrition across all five food categories.' },
      { name: 'Armor Calculator',       href: '/vs-tools/armor.html',   desc: 'Compare armor sets side-by-side and calculate damage reduction.' },
      { name: 'Crop Rotation Planner',  href: '/vs-tools/farming.html', desc: 'Plan crop rotations to maintain soil N/P/K fertility across seasons.' },
      { name: 'Steel Making Tracker',   href: '/vs-tools/steel.html',   desc: 'Track your progress from iron ore to steel and calculate materials needed.' },
    ];

    const list = document.getElementById('vsTools');
    for (const tool of VS_TOOLS) {
      const a = document.createElement('a');
      a.className = 'tool-entry';
      a.href = tool.href;
      a.innerHTML = `
        <div class="tool-entry-name">${tool.name}</div>
        <div class="tool-entry-desc">${tool.desc}</div>
      `;
      list.appendChild(a);
    }
  </script>
</body>
</html>
